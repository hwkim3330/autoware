# ROii 4-LiDAR sensor mapping for CARLA <-> Autoware.
#
# Mirrors the real ROii shuttle suite:
#   - front  G32  (solid-state, 120° forward)   -> lidar_front
#   - rear   G32  (solid-state, 120° backward)  -> lidar_rear   (yaw 180 in calibration)
#   - left   Pandar (rotating 360°)             -> lidar_side_left
#   - right  Pandar (rotating 360°)             -> lidar_side_right
# Total ~520k pts/s (vs 300k single-lidar config) -- verified CPU headroom.
# The four clouds are concatenated by pointcloud_preprocessor_4lidar.launch.py
# (PointCloudConcatenateDataSynchronizerComponent) into
# /sensing/lidar/concatenated/pointcloud for NDT.
#
# horizontal_fov needs the patched carla_wrapper.py (container_patches/).

default_sensor_kit_name: carla_sensor_kit_description

sensor_mappings:
  lidar_front_base_link:
    carla_type: sensor.lidar.ray_cast
    id: front
    ros_config:
      frame_id: lidar_front
      topic_base: /sensing/lidar/front
      topic_suffix: /pointcloud_before_sync
      frequency_hz: 11
      qos_profile: best_effort
    parameters:
      range: 150
      channels: 32
      points_per_second: 130000
      upper_fov: 12.0
      lower_fov: -18.0
      horizontal_fov: 120.0
      rotation_frequency: 20
      noise_stddev: 0.0

  lidar_rear_base_link:
    carla_type: sensor.lidar.ray_cast
    id: rear
    ros_config:
      frame_id: lidar_rear
      topic_base: /sensing/lidar/rear
      topic_suffix: /pointcloud_before_sync
      frequency_hz: 11
      qos_profile: best_effort
    parameters:
      range: 150
      channels: 32
      points_per_second: 130000
      upper_fov: 12.0
      lower_fov: -18.0
      horizontal_fov: 120.0
      rotation_frequency: 20
      noise_stddev: 0.0

  lidar_side_left_base_link:
    carla_type: sensor.lidar.ray_cast
    id: side_left
    ros_config:
      frame_id: lidar_side_left
      topic_base: /sensing/lidar/side_left
      topic_suffix: /pointcloud_before_sync
      frequency_hz: 11
      qos_profile: best_effort
    parameters:
      range: 120
      channels: 32
      points_per_second: 130000
      upper_fov: 15.0
      lower_fov: -25.0
      rotation_frequency: 20
      noise_stddev: 0.0

  lidar_side_right_base_link:
    carla_type: sensor.lidar.ray_cast
    id: side_right
    ros_config:
      frame_id: lidar_side_right
      topic_base: /sensing/lidar/side_right
      topic_suffix: /pointcloud_before_sync
      frequency_hz: 11
      qos_profile: best_effort
    parameters:
      range: 120
      channels: 32
      points_per_second: 130000
      upper_fov: 15.0
      lower_fov: -25.0
      rotation_frequency: 20
      noise_stddev: 0.0

  tamagawa/imu_link:
    carla_type: sensor.other.imu
    id: imu
    ros_config:
      frame_id: tamagawa/imu_link
      topic: /sensing/imu/tamagawa/imu_raw
      frequency_hz: 50
      qos_profile: reliable
    parameters:
      noise_accel_stddev_x: 0.0
      noise_accel_stddev_y: 0.0
      noise_accel_stddev_z: 0.0
      noise_gyro_stddev_x: 0.0
      noise_gyro_stddev_y: 0.0
      noise_gyro_stddev_z: 0.0

  gnss_link:
    carla_type: sensor.other.gnss
    id: gnss
    ros_config:
      frame_id: map
      topic: /sensing/gnss/pose_with_covariance
      frequency_hz: 2
      qos_profile: reliable
    parameters:
      noise_alt_stddev: 0.0
      noise_lat_stddev: 0.0
      noise_lon_stddev: 0.0
      noise_alt_bias: 0.0
      noise_lat_bias: 0.0
      noise_lon_bias: 0.0
    covariance:
      position_variance: 0.01
      orientation_variance: 1.0

normalization:
  strip_suffixes:
    - _base_link
    - _link
    - /camera_link

enabled_sensors:
  - lidar_front_base_link
  - lidar_rear_base_link
  - lidar_side_left_base_link
  - lidar_side_right_base_link
  - tamagawa/imu_link
  - gnss_link
