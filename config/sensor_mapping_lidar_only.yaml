# Lidar-only sensor mapping for CARLA <-> Autoware (localization-only runs).
#
# Drop-in replacement for:
#   /opt/autoware/share/autoware_carla_interface/config/sensor_mapping.yaml
# inside the Autoware container.
#
# WHY: the stock mapping enables 6 RGB cameras at 1600x900 @ 11 Hz. Spawning all
# six camera sensors at once makes CARLA 0.9.16 (UE4.26, RenderOffScreen)
# segfault (Signal 11) the instant the autoware_carla_interface attaches them --
# the renderer cannot bring up six render targets concurrently while the rest of
# Autoware is also starting. With `perception:=false` the cameras are never used
# anyway; NDT localization only needs LiDAR + IMU + GNSS.
#
# Keeping only those three sensors lets CARLA survive and the full
# sensing -> NDT -> localization pipeline converge (verified: lidar 7.7 Hz,
# concatenated 9.9 Hz, NDT downsample input 9.8 Hz, kinematic_state 19 Hz,
# TF map->base_link present).

default_sensor_kit_name: carla_sensor_kit_description

sensor_mappings:
  # LiDAR sensor
  velodyne_top_base_link:
    carla_type: sensor.lidar.ray_cast
    id: top
    ros_config:
      frame_id: velodyne_top
      topic_base: /sensing/lidar/top
      topic_suffix: /pointcloud_before_sync
      frequency_hz: 11
      qos_profile: best_effort
    parameters:
      range: 100
      channels: 64
      points_per_second: 300000
      upper_fov: 10.0
      lower_fov: -30.0
      rotation_frequency: 20
      noise_stddev: 0.0

  # IMU sensor
  tamagawa/imu_link:
    carla_type: sensor.other.imu
    id: imu
    ros_config:
      frame_id: tamagawa/imu_link
      topic: /sensing/imu/tamagawa/imu_raw
      frequency_hz: 50
      qos_profile: reliable
    parameters:
      noise_accel_stddev_x: 0.0
      noise_accel_stddev_y: 0.0
      noise_accel_stddev_z: 0.0
      noise_gyro_stddev_x: 0.0
      noise_gyro_stddev_y: 0.0
      noise_gyro_stddev_z: 0.0

  # GNSS sensor
  gnss_link:
    carla_type: sensor.other.gnss
    id: gnss
    ros_config:
      frame_id: map
      topic: /sensing/gnss/pose_with_covariance
      frequency_hz: 2
      qos_profile: reliable
    parameters:
      noise_alt_stddev: 0.0
      noise_lat_stddev: 0.0
      noise_lon_stddev: 0.0
      noise_alt_bias: 0.0
      noise_lat_bias: 0.0
      noise_lon_bias: 0.0
    covariance:
      position_variance: 0.01
      orientation_variance: 1.0

normalization:
  strip_suffixes:
    - _base_link
    - _link
    - /camera_link

# Only LiDAR + IMU + GNSS enabled (no cameras -> CARLA does not crash).
enabled_sensors:
  - velodyne_top_base_link
  - tamagawa/imu_link
  - gnss_link
