# ROii 4-LiDAR sensor mapping -- profile HIGH (ROii 센서 커버리지 근사 (CPU 부하 큼))
# Generated from config/roii_sensor_spec.yaml. Mount positions are PLACEHOLDERS.
# Interface publishes .../pointcloud_raw; the fault injector republishes
# .../pointcloud_before_sync which the ROii concatenation consumes.
default_sensor_kit_name: carla_sensor_kit_description
sensor_mappings:
  roii_front_g32_base_link:
    carla_type: sensor.lidar.ray_cast
    id: front_g32
    ros_config:
      frame_id: roii_front_g32
      topic_base: /sensing/lidar/front_g32
      topic_suffix: /pointcloud_raw
      frequency_hz: 11
      qos_profile: best_effort
    parameters:
      range: 300
      channels: 32
      points_per_second: 300000
      upper_fov: 5.0
      lower_fov: -5.0
      rotation_frequency: 10
      noise_stddev: 0.0
      horizontal_fov: 135.0
  roii_rear_g32_base_link:
    carla_type: sensor.lidar.ray_cast
    id: rear_g32
    ros_config:
      frame_id: roii_rear_g32
      topic_base: /sensing/lidar/rear_g32
      topic_suffix: /pointcloud_raw
      frequency_hz: 11
      qos_profile: best_effort
    parameters:
      range: 300
      channels: 32
      points_per_second: 300000
      upper_fov: 5.0
      lower_fov: -5.0
      rotation_frequency: 10
      noise_stddev: 0.0
      horizontal_fov: 135.0
  roii_left_pandar_base_link:
    carla_type: sensor.lidar.ray_cast
    id: left_pandar
    ros_config:
      frame_id: roii_left_pandar
      topic_base: /sensing/lidar/left_pandar
      topic_suffix: /pointcloud_raw
      frequency_hz: 11
      qos_profile: best_effort
    parameters:
      range: 200
      channels: 40
      points_per_second: 500000
      upper_fov: 15.0
      lower_fov: -25.0
      rotation_frequency: 10
      noise_stddev: 0.0
  roii_right_pandar_base_link:
    carla_type: sensor.lidar.ray_cast
    id: right_pandar
    ros_config:
      frame_id: roii_right_pandar
      topic_base: /sensing/lidar/right_pandar
      topic_suffix: /pointcloud_raw
      frequency_hz: 11
      qos_profile: best_effort
    parameters:
      range: 200
      channels: 40
      points_per_second: 500000
      upper_fov: 15.0
      lower_fov: -25.0
      rotation_frequency: 10
      noise_stddev: 0.0
  tamagawa/imu_link:
    carla_type: sensor.other.imu
    id: imu
    ros_config:
      frame_id: tamagawa/imu_link
      topic: /sensing/imu/tamagawa/imu_raw
      frequency_hz: 50
      qos_profile: reliable
    parameters:
      noise_accel_stddev_x: 0.0
      noise_accel_stddev_y: 0.0
      noise_accel_stddev_z: 0.0
      noise_gyro_stddev_x: 0.0
      noise_gyro_stddev_y: 0.0
      noise_gyro_stddev_z: 0.0
  gnss_link:
    carla_type: sensor.other.gnss
    id: gnss
    ros_config:
      frame_id: map
      topic: /sensing/gnss/pose_with_covariance
      frequency_hz: 2
      qos_profile: reliable
    parameters:
      noise_alt_stddev: 0.0
      noise_lat_stddev: 0.0
      noise_lon_stddev: 0.0
      noise_alt_bias: 0.0
      noise_lat_bias: 0.0
      noise_lon_bias: 0.0
    covariance:
      position_variance: 0.01
      orientation_variance: 1.0
normalization:
  strip_suffixes:
  - _base_link
  - _link
  - /camera_link
enabled_sensors:
- roii_front_g32_base_link
- roii_rear_g32_base_link
- roii_left_pandar_base_link
- roii_right_pandar_base_link
- tamagawa/imu_link
- gnss_link
